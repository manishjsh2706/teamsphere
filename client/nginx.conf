server {
    listen 80;
    # nginx listens on port 80

    server_name localhost;

    root /usr/share/nginx/html;
    # Where our built React files are

    index index.html;

    # ─────────────────────────────────────────
    # IMPORTANT — Handle React Router
    # ─────────────────────────────────────────
    # Without this, refreshing on /dashboard
    # gives a 404 error because nginx looks
    # for a file called "dashboard" which
    # doesn't exist — React Router handles it
    location / {
        try_files $uri $uri/ /index.html;
        # Try to find the file
        # If not found, serve index.html
        # Let React Router handle the URL
    }

    # ─────────────────────────────────────────
    # PROXY API REQUESTS TO BACKEND
    # ─────────────────────────────────────────
    # When frontend calls /api/...
    # nginx forwards it to the backend container
    location /api {
        proxy_pass http://server:5000;
        # "server" is the backend container name
        # defined in docker-compose.yml

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy uploads folder too
    location /uploads {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}